<?xml version="1.0" encoding="UTF-8"?>
<!--
  MAXIM Encyclopedia — 12-Ray Radial Mark

  12 rays at 30° intervals. Filled center point.
  12 + 1 = 13 sections = 52 volumes.

  Production notes:
  - Single color (gold foil in print, black for digital)
  - Front cover: 2.5" diameter, centered upper third
  - Spine: 0.6" diameter, top of spine
  - Provide to binder as SVG or EPS for foil die

  Ray assignments (clockwise from 12 o'clock):
    0°   Ray 1  — Natural World
    30°  Ray 2  — Earth & Space
    60°  Ray 3  — Material Culture
    90°  Ray 4  — Life Sciences
    120° Ray 5  — History & Ideas
    150° Ray 6  — Mechanics
    180° Ray 7  — Technology
    210° Ray 8  — Social Sciences
    240° Ray 9  — Language & Communication
    270° Ray 10 — Mathematics & Physics
    300° Ray 11 — Arts & Culture
    330° Ray 12 — Computing & Software
    ●    Center — People
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <title>MAXIM Mark — 12-Ray Radial Symbol</title>

  <!-- Rays: 12 lines from center (100,100) to endpoints at radius 80 -->
  <!-- θ clockwise from 12 o'clock: x = 100 + 80·sin(θ), y = 100 - 80·cos(θ) -->
  <g stroke="#000" stroke-width="2.4" stroke-linecap="round">
    <!--   0° — Natural World        -->  <line x1="100" y1="100" x2="100"   y2="20"   />
    <!--  30° — Earth & Space         -->  <line x1="100" y1="100" x2="140"   y2="30.72"/>
    <!--  60° — Material Culture      -->  <line x1="100" y1="100" x2="169.28" y2="60"  />
    <!--  90° — Life Sciences         -->  <line x1="100" y1="100" x2="180"   y2="100"  />
    <!-- 120° — History & Ideas       -->  <line x1="100" y1="100" x2="169.28" y2="140" />
    <!-- 150° — Mechanics             -->  <line x1="100" y1="100" x2="140"   y2="169.28"/>
    <!-- 180° — Technology            -->  <line x1="100" y1="100" x2="100"   y2="180"  />
    <!-- 210° — Social Sciences       -->  <line x1="100" y1="100" x2="60"    y2="169.28"/>
    <!-- 240° — Language & Comm       -->  <line x1="100" y1="100" x2="30.72" y2="140"  />
    <!-- 270° — Math & Physics        -->  <line x1="100" y1="100" x2="20"    y2="100"  />
    <!-- 300° — Arts & Culture        -->  <line x1="100" y1="100" x2="30.72" y2="60"   />
    <!-- 330° — Computing & Software  -->  <line x1="100" y1="100" x2="60"    y2="30.72"/>
  </g>

  <!-- Endpoints: small filled circles at each ray terminus (r=4) -->
  <g fill="#000">
    <circle cx="100"    cy="20"     r="4"/>  <!--   0° -->
    <circle cx="140"    cy="30.72"  r="4"/>  <!--  30° -->
    <circle cx="169.28" cy="60"     r="4"/>  <!--  60° -->
    <circle cx="180"    cy="100"    r="4"/>  <!--  90° -->
    <circle cx="169.28" cy="140"    r="4"/>  <!-- 120° -->
    <circle cx="140"    cy="169.28" r="4"/>  <!-- 150° -->
    <circle cx="100"    cy="180"    r="4"/>  <!-- 180° -->
    <circle cx="60"     cy="169.28" r="4"/>  <!-- 210° -->
    <circle cx="30.72"  cy="140"    r="4"/>  <!-- 240° -->
    <circle cx="20"     cy="100"    r="4"/>  <!-- 270° -->
    <circle cx="30.72"  cy="60"     r="4"/>  <!-- 300° -->
    <circle cx="60"     cy="30.72"  r="4"/>  <!-- 330° -->
  </g>

  <!-- Center point: filled circle, visually larger than endpoints (r=7) -->
  <!-- This is People — the origin and culmination -->
  <circle cx="100" cy="100" r="7" fill="#000"/>
</svg>
