site_name: Reference Library
site_description: Personal reference library — computing, science, mathematics, history, craft
docs_dir: ..
site_dir: ../../reference-site

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow
  font:
    text: Inter
    code: JetBrains Mono

markdown_extensions:
  - tables
  - attr_list
  - def_list
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - toc:
      permalink: true
      toc_depth: 3

plugins:
  - search:
      lang: en

