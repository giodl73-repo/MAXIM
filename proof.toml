# proof.toml — MAXIM Reference Library root schema
# Applies to all content guides. Per-directory proof.toml files inherit and extend.

[meta]
name = "MAXIM Reference Library"
description = "Universal rules for all 2,170 reference guides"

[files]
include = ["**/*.md"]
exclude = [
    # Library management (not content guides)
    "TRACKER.md", "BILL-OF-MATERIALS.md", "VOLUMES.md", "EXPANSION.md",
    "REVIEW.md", "SCORECARD.md", "HISTORY.md", "CONCEPT-INDEX.md",
    "READING-MAPS.md", "PREREQUISITES.md", "PROJECTS.md", "COLOPHON.md",
    "FOREWORD.md", "DEDICATION.md", "PUZZLE-HUNT.md", "TO-SIGNAL.md",
    "CLAUDE.md", "LICENSE.md", "book.md", "index.md",
    # Generated / archive
    "_archive/**",
    # Special structure — not content guides
    "sections/**",
    "atlas/**", "naturalis/**", "joker/**", "cards/**",
    "puzzle-hunt/**", "read-this-first/**",
    # Directory metadata files
    "*/00-OVERVIEW.md", "*/STATUS.md",
    # Root-level scripts
    "*.py",
]
root = true

# ─────────────────────────────────────────────────────────
# ASCII Art — applies to all guides
# ─────────────────────────────────────────────────────────

[ascii_box]
enabled = true
# Allow ±2 col drift: remaining off-by-1/2 errors have cells that exactly fill their
# width with no trailing space to add/remove — can't be auto-fixed without content edits.
tolerance = 2
code_blocks_only = true
check_unicode = true
# Spatial diagram layouts (boxes at different horizontal positions in one code block)
# cause "missing column separator" false positives. The library has many such diagrams.
# Width mismatches (ascii_box_width) are still fully checked.
check_col_separators = false

[ascii_char]
enabled = true
# CJK ideographs, Hiragana, Katakana appear throughout the library as intentional examples
# (world-languages, culinary-history, typography, literature, etc.). The ascii_box checker
# already uses visual_width (CJK = 2 cols) to validate alignment — if a box is incorrectly
# drawn around CJK content, ascii_box_width catches it. Suppress the redundant char error.
error_on_wide = false

[ascii_flow]
enabled = true
check_arrow_alignment = true
check_cell_padding = true
min_cell_padding = 1

# ─────────────────────────────────────────────────────────
# Markdown — universal structure rules
# ─────────────────────────────────────────────────────────

[markdown]
enabled = true
max_h1 = 1
required_h2_all = ["Decision Cheat Sheet"]

[[markdown.required_patterns]]
pattern = "```"
description = "must contain at least one code block (landscape diagram)"
severity = "warning"

[markdown_table]
# Math and code guides use | in content (|G| group order, |x| absolute value,
# bitwise OR, regex alternation, etc.) which the table parser splits into extra
# columns. Suppress "body has N cols but header has 2" false positives.
# Rows with FEWER columns than the header are still flagged (genuine errors).
ignore_extra_body_cols = true

# ─────────────────────────────────────────────────────────
# Custom rules
# ─────────────────────────────────────────────────────────

[[custom_rules]]
name = "no_editor_tags"
description = "@editor review tags should be resolved before a guide is considered complete"
pattern = "@editor\\["
negate = true
severity = "warning"

[[davinci]]
id = "goroutine-scheduler"
uri = "md://languages/10-GO.md#concurrency-model-conceptual-landscape:0"
description = "Go M:N multiplexing scheduler diagram"
protection = "error"

  [[davinci.invariants]]
  rule = "contains-text"
  text = "M:N multiplexing"

  [[davinci.invariants]]
  rule = "contains-text"
  text = "Goroutines"

  [[davinci.invariants]]
  rule = "box-count"
  min = 3

